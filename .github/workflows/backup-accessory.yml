name: Backup Accessory

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/backup-accessory.yml
      - .kamal/hooks/pre-connect
      - config/deploy.yml
      - config/kamal-backup.yml
      - Gemfile
      - Gemfile.lock

permissions:
  contents: read

jobs:
  reboot:
    runs-on: ubuntu-latest

    env:
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
      HONEYBADGER_API_KEY: ${{ secrets.HONEYBADGER_API_KEY }}
      RESTIC_REPOSITORY: ${{ secrets.RESTIC_REPOSITORY }}
      RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Validate backup accessory
        run: bundle exec kamal-backup validate

      - name: Reboot backup accessory
        run: bundle exec kamal accessory reboot backup
